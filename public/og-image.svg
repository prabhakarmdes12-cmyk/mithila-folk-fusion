<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Madhubani geometric border pattern - top -->
    <pattern id="border-top" x="0" y="0" width="24" height="8" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="8" fill="#8B1A1A"/>
      <rect x="6" y="0" width="4" height="8" fill="#006B6B"/>
      <rect x="12" y="0" width="4" height="8" fill="#C41E7F"/>
      <rect x="18" y="0" width="4" height="8" fill="#E8A317"/>
    </pattern>
    <!-- Madhubani geometric border pattern - side -->
    <pattern id="border-side" x="0" y="0" width="8" height="24" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="8" height="4" fill="#8B1A1A"/>
      <rect x="0" y="6" width="8" height="4" fill="#006B6B"/>
      <rect x="0" y="12" width="8" height="4" fill="#C41E7F"/>
      <rect x="0" y="18" width="8" height="4" fill="#E8A317"/>
    </pattern>
    <!-- Corner mandala gradient -->
    <radialGradient id="mandala-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A317" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B1A1A" stop-opacity="0.1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#FDF5E6"/>

  <!-- Outer decorative border - geometric Madhubani pattern -->
  <!-- Top border -->
  <rect x="0" y="0" width="1200" height="10" fill="url(#border-top)"/>
  <!-- Bottom border -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#border-top)"/>
  <!-- Left border -->
  <rect x="0" y="0" width="10" height="630" fill="url(#border-side)"/>
  <!-- Right border -->
  <rect x="1190" y="0" width="10" height="630" fill="url(#border-side)"/>

  <!-- Inner border line -->
  <rect x="18" y="18" width="1164" height="594" fill="none" stroke="#8B1A1A" stroke-width="2"/>
  <rect x="22" y="22" width="1156" height="586" fill="none" stroke="#E8A317" stroke-width="1"/>

  <!-- Corner lotus decorations -->
  <!-- Top-left -->
  <g transform="translate(50, 50)">
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="none" stroke="#C41E3A" stroke-width="2"/>
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="none" stroke="#E8A317" stroke-width="1.5" transform="rotate(30)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="none" stroke="#C41E3A" stroke-width="1.5" transform="rotate(-30)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="none" stroke="#C41E7F" stroke-width="1.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="none" stroke="#C41E7F" stroke-width="1.5" transform="rotate(-60)"/>
    <circle cx="0" cy="-14" r="4" fill="#E8A317" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#8B1A1A"/>
  </g>

  <!-- Top-right -->
  <g transform="translate(1150, 50)">
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="none" stroke="#C41E3A" stroke-width="2"/>
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="none" stroke="#E8A317" stroke-width="1.5" transform="rotate(30)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="none" stroke="#C41E3A" stroke-width="1.5" transform="rotate(-30)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="none" stroke="#C41E7F" stroke-width="1.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="-14" rx="5" ry="14" fill="none" stroke="#C41E7F" stroke-width="1.5" transform="rotate(-60)"/>
    <circle cx="0" cy="-14" r="4" fill="#E8A317" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#8B1A1A"/>
  </g>

  <!-- Bottom-left -->
  <g transform="translate(50, 580)">
    <ellipse cx="0" cy="14" rx="5" ry="14" fill="none" stroke="#C41E3A" stroke-width="2"/>
    <ellipse cx="0" cy="14" rx="5" ry="14" fill="none" stroke="#E8A317" stroke-width="1.5" transform="rotate(30)"/>
    <ellipse cx="0" cy="14" rx="5" ry="14" fill="none" stroke="#C41E3A" stroke-width="1.5" transform="rotate(-30)"/>
    <ellipse cx="0" cy="14" rx="5" ry="14" fill="none" stroke="#C41E7F" stroke-width="1.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="14" rx="5" ry="14" fill="none" stroke="#C41E7F" stroke-width="1.5" transform="rotate(-60)"/>
    <circle cx="0" cy="14" r="4" fill="#E8A317" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#8B1A1A"/>
  </g>

  <!-- Bottom-right -->
  <g transform="translate(1150, 580)">
    <ellipse cx="0" cy="14" rx="5" ry="14" fill="none" stroke="#C41E3A" stroke-width="2"/>
    <ellipse cx="0" cy="14" rx="5" ry="14" fill="none" stroke="#E8A317" stroke-width="1.5" transform="rotate(30)"/>
    <ellipse cx="0" cy="14" rx="5" ry="14" fill="none" stroke="#C41E3A" stroke-width="1.5" transform="rotate(-30)"/>
    <ellipse cx="0" cy="14" rx="5" ry="14" fill="none" stroke="#C41E7F" stroke-width="1.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="14" rx="5" ry="14" fill="none" stroke="#C41E7F" stroke-width="1.5" transform="rotate(-60)"/>
    <circle cx="0" cy="14" r="4" fill="#E8A317" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#8B1A1A"/>
  </g>

  <!-- Center mandala watermark -->
  <g transform="translate(600, 315)" opacity="0.06">
    <circle r="180" fill="none" stroke="#8B1A1A" stroke-width="3"/>
    <circle r="150" fill="none" stroke="#006B6B" stroke-width="2"/>
    <circle r="120" fill="none" stroke="#C41E7F" stroke-width="2"/>
    <circle r="90" fill="none" stroke="#E8A317" stroke-width="2"/>
    <circle r="60" fill="none" stroke="#8B1A1A" stroke-width="1.5"/>
    <circle r="30" fill="#E8A317" opacity="0.3"/>
    <!-- Radial petals -->
    <g>
      <ellipse cx="0" cy="-100" rx="12" ry="30" fill="#8B1A1A" opacity="0.4"/>
      <ellipse cx="0" cy="-100" rx="12" ry="30" fill="#C41E7F" opacity="0.3" transform="rotate(45)"/>
      <ellipse cx="0" cy="-100" rx="12" ry="30" fill="#006B6B" opacity="0.3" transform="rotate(90)"/>
      <ellipse cx="0" cy="-100" rx="12" ry="30" fill="#E8A317" opacity="0.3" transform="rotate(135)"/>
      <ellipse cx="0" cy="-100" rx="12" ry="30" fill="#8B1A1A" opacity="0.4" transform="rotate(180)"/>
      <ellipse cx="0" cy="-100" rx="12" ry="30" fill="#C41E7F" opacity="0.3" transform="rotate(225)"/>
      <ellipse cx="0" cy="-100" rx="12" ry="30" fill="#006B6B" opacity="0.3" transform="rotate(270)"/>
      <ellipse cx="0" cy="-100" rx="12" ry="30" fill="#E8A317" opacity="0.3" transform="rotate(315)"/>
    </g>
  </g>

  <!-- Logo -->
  <image x="430" y="100" width="340" height="340" href="images/mithila-folk-fusion-logo.png" preserveAspectRatio="xMidYMid meet"/>

  <!-- Divider line below logo -->
  <line x1="400" y1="460" x2="800" y2="460" stroke="#E8A317" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="460" r="3" fill="#8B1A1A"/>
  <circle cx="800" cy="460" r="3" fill="#8B1A1A"/>
  <circle cx="600" cy="460" r="4" fill="#C41E7F"/>

  <!-- Title text -->
  <text x="600" y="505" text-anchor="middle" font-family="'Cinzel Decorative', serif" font-size="38" font-weight="700" fill="#8B1A1A" letter-spacing="3">
    Mithila Folk Art
  </text>

  <!-- Subtitle -->
  <text x="600" y="545" text-anchor="middle" font-family="'Playfair Display', serif" font-size="22" fill="#5C3317" font-style="italic" opacity="0.8">
    by Shivangi Singh
  </text>

  <!-- Tagline -->
  <text x="600" y="580" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="16" fill="#8B1A1A" opacity="0.6" letter-spacing="2">
    MITHILAFOLKFUSIONS
  </text>
</svg>
